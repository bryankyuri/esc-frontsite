server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip static assets.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA: unknown routes fall back to index.html (react-router handles them).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API -> FastAPI service (same-origin, so the CORS whitelist isn't exercised
    # by the app itself; it still guards any external/direct callers).
    location /api/ {
        proxy_pass http://api:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location = /health {
        proxy_pass http://api:8002/health;
    }
}
